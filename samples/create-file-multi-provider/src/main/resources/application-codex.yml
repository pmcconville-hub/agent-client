# OpenAI Codex CLI configuration
# Requires: Codex CLI installed (npm install -g @openai/codex)
# Auth: OPENAI_API_KEY env var
#
# Note: skip-git-check defaults to true in LOOSE mode (the default).
# Set spring.ai.agents.codex.mode=strict to require a git repository.
spring:
  ai:
    agents:
      codex:
        model: gpt-5-codex
        timeout: PT3M
