# Provider Parity Matrix
# Runs ProviderParityTCK scenarios across Claude, Codex, and Gemini
# to catch behavioral parity regressions (e.g., Codex skipGitCheck issue)

name: Provider Parity

on:
  pull_request:
    branches: [main]
    paths:
      - 'agent-models/**'
      - 'provider-sdks/**'
      - 'agent-client-core/**'
  push:
    branches: [main]
    paths:
      - 'agent-models/**'
      - 'provider-sdks/**'
      - 'agent-client-core/**'
  workflow_dispatch:

concurrency:
  group: parity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parity:
    # Only run in the upstream repo (forks won't have secrets)
    if: github.repository_owner == 'spring-ai-community'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        provider:
          - name: claude
            module: agent-models/agent-claude
            test-class: ClaudeProviderParityIT
            cli-install: npm install -g @anthropic-ai/claude-code
            secret-env: ANTHROPIC_API_KEY
          - name: codex
            module: agent-models/agent-codex
            test-class: CodexProviderParityIT
            cli-install: npm install -g @openai/codex
            secret-env: OPENAI_API_KEY
          - name: gemini
            module: agent-models/agent-gemini
            test-class: GeminiProviderParityIT
            cli-install: npm install -g @anthropic-ai/gemini-cli
            secret-env: GEMINI_API_KEY

    name: Parity - ${{ matrix.provider.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install CLI
        run: ${{ matrix.provider.cli-install }}
        continue-on-error: true

      - name: Run parity tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          ./mvnw test \
            -pl ${{ matrix.provider.module }} \
            -Dtest="${{ matrix.provider.test-class }}" \
            -B --no-transfer-progress \
            2>&1 | tail -50
        continue-on-error: true

      - name: Parse surefire results
        if: always()
        id: results
        run: |
          REPORT_DIR="${{ matrix.provider.module }}/target/surefire-reports"
          if [ -d "$REPORT_DIR" ]; then
            PASSED=$(grep -l 'tests="[^0]"' "$REPORT_DIR"/*.xml 2>/dev/null | xargs grep -c 'failures="0" errors="0"' 2>/dev/null | grep -c ':1$' || echo 0)
            FAILED=$(grep -rl 'failures="[^0]"\|errors="[^0]"' "$REPORT_DIR"/*.xml 2>/dev/null | wc -l || echo 0)
            SKIPPED=$(grep -rl 'skipped="[^0]"' "$REPORT_DIR"/*.xml 2>/dev/null | wc -l || echo 0)
            echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
            echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
            echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          else
            echo "passed=0" >> "$GITHUB_OUTPUT"
            echo "failed=0" >> "$GITHUB_OUTPUT"
            echo "skipped=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-${{ matrix.provider.name }}
          path: ${{ matrix.provider.module }}/target/surefire-reports/
          if-no-files-found: ignore

  summary:
    needs: parity
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Parity Summary
        run: |
          echo "## Provider Parity Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Provider | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Claude | ${{ needs.parity.result == 'success' && 'PASS' || 'CHECK ARTIFACTS' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Codex | ${{ needs.parity.result == 'success' && 'PASS' || 'CHECK ARTIFACTS' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Gemini | ${{ needs.parity.result == 'success' && 'PASS' || 'CHECK ARTIFACTS' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "See surefire artifacts for PASS/FAIL/NOT_APPLICABLE per scenario." >> "$GITHUB_STEP_SUMMARY"
